<html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symbian-Ubuntu OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; overflow: hidden; }
        .glass { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); border: 1px solid #1e3a8a; }
        #phone-container { height: 450px; width: 260px; overflow: hidden; position: relative; border-radius: 40px; border: 4px solid #334155; background: #000; }
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 20px; }
        .view { height: 100%; width: 100%; overflow-y: auto; padding: 16px; position: absolute; top: 0; left: 0; z-index: 10; background: rgba(0,0,0,0.6); }
        .telemetry-log { font-family: monospace; font-size: 8px; color: #10b981; }
        .icon { width: 32px; height: 32px; }
        .hidden { display: none; }
        canvas { position: absolute; top: 0; left: 0; z-index: 0; opacity: 0.4; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">

<div id="phone-container" class="text-white">
    <canvas id="graphitiCanvas"></canvas>
    
    <div id="global-lock" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/80 backdrop-blur-md">
        <h2 class="mb-4 text-xs font-bold tracking-[0.2em] text-blue-500 animate-pulse">SYSTEM_FLUX_01</h2>
        <div id="glitch-vars" class="telemetry-log mb-4 text-orange-500">VAR_X: 0x4829 // SYNC: 100%</div>
        <input type="password" id="global-pin" placeholder="ENTER KEY" class="glass p-3 w-40 text-center rounded-lg mb-4 text-blue-300 font-mono">
        <button onclick="checkGlobalPin()" class="text-[10px] uppercase border border-blue-900 px-6 py-2 hover:bg-blue-900/30 transition-all">Unlock Bridge</button>
    </div>

    <!-- Home Menu -->
    <div id="view-home" class="view">
        <h1 class="text-xs font-bold text-center mt-2 opacity-50 uppercase tracking-widest">Main Menu</h1>
        <div class="app-grid mt-2">
            <button onclick="showView('view-phone')" class="glass p-2 rounded-lg flex justify-center"><img src="https://img.icons8.com/color/96/000000/phone.png" class="icon"></button>
            <button onclick="showView('view-browser')" class="glass p-2 rounded-lg flex justify-center"><img src="https://img.icons8.com/color/96/000000/internet.png" class="icon"></button>
            <button onclick="showView('view-vpc')" class="glass p-2 rounded-lg flex justify-center text-[8px] items-center">VPC</button>
            <button onclick="runSpeedTest('view-speedtest-10', 10)" class="glass p-2 rounded-lg flex justify-center text-[6px] items-center text-center leading-tight">10G</button>
            <button onclick="runSpeedTest('view-speedtest-40', 40)" class="glass p-2 rounded-lg flex justify-center text-[6px] items-center text-center leading-tight">40G</button>
            <button onclick="runSpeedTest('view-speedtest-100', 100)" class="glass p-2 rounded-lg flex justify-center text-[6px] items-center text-center leading-tight">100G</button>
        </div>
    </div>

    <!-- Speedtest Views -->
    <div id="view-speedtest-10" class="view hidden"><h2 class="text-[10px] mb-2 text-yellow-400 uppercase">10 Gbps Test</h2><div class="glass p-8 rounded text-center"><p id="res-10" class="text-2xl font-bold">Testing...</p></div><button onclick="showView('view-home')" class="mt-4 w-full glass p-2 rounded text-[10px]">Menu</button></div>
    <div id="view-speedtest-40" class="view hidden"><h2 class="text-[10px] mb-2 text-orange-400 uppercase">40 Gbps Test</h2><div class="glass p-8 rounded text-center"><p id="res-40" class="text-2xl font-bold">Testing...</p></div><button onclick="showView('view-home')" class="mt-4 w-full glass p-2 rounded text-[10px]">Menu</button></div>
    <div id="view-speedtest-100" class="view hidden"><h2 class="text-[10px] mb-2 text-red-400 uppercase">100 Gbps Test</h2><div class="glass p-8 rounded text-center"><p id="res-100" class="text-2xl font-bold">Testing...</p></div><button onclick="showView('view-home')" class="mt-4 w-full glass p-2 rounded text-[10px]">Menu</button></div>

    <div id="view-vpc" class="view hidden">
        <h2 class="text-xs mb-2 text-blue-400">Google Cloud VPC</h2>
        <div class="glass p-4 rounded text-[10px] space-y-2">
            <p>Status: <span class="text-emerald-500">CONNECTED</span></p>
        </div>
        <button onclick="showView('view-home')" class="mt-4 w-full glass p-2 rounded text-[10px]">Menu</button>
    </div>

    <div id="view-browser" class="view hidden">
        <h2 class="text-xs mb-2">Browser</h2>
        <input type="text" id="url-bar" value="https://google.com" class="w-full glass p-2 text-xs mb-2">
        <iframe id="browser-frame" src="https://google.com" class="w-full h-48 bg-white"></iframe>
        <button onclick="showView('view-home')" class="mt-4 w-full glass p-2 rounded text-[10px]">Menu</button>
    </div>

    <div id="view-phone" class="view hidden">
        <h2 class="text-xs mb-2">Dialer</h2>
        <div id="display" class="glass p-2 mb-2 text-center h-8 font-mono text-lg"></div>
        <div class="grid grid-cols-3 gap-2">
            <button onclick="addDigit(1)" class="glass p-2 rounded">1</button><button onclick="addDigit(2)" class="glass p-2 rounded">2</button><button onclick="addDigit(3)" class="glass p-2 rounded">3</button>
            <button onclick="addDigit(4)" class="glass p-2 rounded">4</button><button onclick="addDigit(5)" class="glass p-2 rounded">5</button><button onclick="addDigit(6)" class="glass p-2 rounded">6</button>
            <button onclick="addDigit(7)" class="glass p-2 rounded">7</button><button onclick="addDigit(8)" class="glass p-2 rounded">8</button><button onclick="addDigit(9)" class="glass p-2 rounded">9</button>
            <button onclick="addDigit('*')" class="glass p-2 rounded">*</button><button onclick="addDigit(0)" class="glass p-2 rounded">0</button><button onclick="addDigit('#')" class="glass p-2 rounded">#</button>
            <button onclick="call()" class="bg-green-700 p-2 rounded">CALL</button>
            <button onclick="clearDisplay()" class="bg-red-700 p-2 rounded">END</button>
            <button onclick="showView('view-home')" class="glass p-2 rounded">MENU</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('graphitiCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 260; canvas.height = 450;
    
    function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 1;
        for(let i=0; i<10; i++) {
            ctx.beginPath();
            ctx.moveTo(Math.random()*260, Math.random()*450);
            ctx.lineTo(Math.random()*260, Math.random()*450);
            ctx.stroke();
        }
        document.getElementById('glitch-vars').innerText = 'VAR_X: ' + Math.random().toString(16).substr(2, 6) + ' // SYNC: ' + Math.floor(Math.random()*100) + '%';
    }
    setInterval(draw, 45);

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function runSpeedTest(id, base) {
        showView(id);
        const display = document.getElementById('res-' + (base === 10 ? '10' : base === 40 ? '40' : '100'));
        display.innerText = "Syncing...";
        setTimeout(() => {
            const val = (base + Math.random() * (base * 0.2)).toFixed(2);
            display.innerText = val + " Gbps";
        }, 1200);
    }
    function checkGlobalPin() {
        if(document.getElementById('global-pin').value === '8888') {
            document.getElementById('global-lock').classList.add('hidden');
        } else { alert('Access Denied'); }
    }
    function addDigit(d) { document.getElementById('display').innerText += d; }
    function clearDisplay() { document.getElementById('display').innerText = ''; }
    function call() { alert('Calling: ' + document.getElementById('display').innerText); }
</script>
</body>
</html>
